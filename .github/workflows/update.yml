name: update-mobile-whitelist-mixed-200

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Update file
        run: python scripts/update.py
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/mobile-whitelist-mixed-200.txt
          if git diff --cached --quiet; then
            echo 'No changes'
            exit 0
          fi
          git commit -m 'Update mobile-whitelist-mixed-200'
          git push
